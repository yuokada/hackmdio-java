name: Java CI
permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: debian:13-slim

    steps:
      - name: Install runner dependencies
        run: |
          apt-get update
          apt-get install --yes ca-certificates curl git libicu76

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify
        run: ./mvnw -B verify
